<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador de Conquista — Fluxograma</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f6f8fa;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
  }

  header {
    text-align: center;
    margin-bottom: 2rem;
  }

  .badge {
    display: inline-block;
    background: #1a3f6f;
    color: white;
    font-size: 11px;
    padding: 3px 12px;
    border-radius: 20px;
    margin-bottom: 10px;
    letter-spacing: 0.5px;
  }

  header h1 {
    font-size: 22px;
    font-weight: 600;
    color: #1a3f6f;
    margin-bottom: 4px;
  }

  header p {
    font-size: 13px;
    color: #57606a;
  }

  .card {
    background: white;
    border: 1px solid #d0d7de;
    border-radius: 12px;
    padding: 2rem;
    max-width: 780px;
    width: 100%;
    margin-bottom: 1rem;
  }

  svg text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

  .legend {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 1.5rem;
    padding-top: 1.5rem;
    border-top: 1px solid #d0d7de;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 12px;
    color: #57606a;
  }

  .legend-dot {
    width: 14px;
    height: 14px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  footer {
    font-size: 11px;
    color: #8c959f;
    text-align: center;
    margin-top: 0.5rem;
  }

  @media (prefers-color-scheme: dark) {
    body { background: #0d1117; }
    .card { background: #161b22; border-color: #30363d; }
    header h1 { color: #79b8ff; }
    header p { color: #8b949e; }
    .badge { background: #1f4e8c; }
    .legend { border-color: #30363d; }
    .legend-item { color: #8b949e; }
    footer { color: #484f58; }
  }
</style>
</head>
<body>

<header>
  <div class="badge">UNASP · Sistemas de Informação</div>
  <h1>💘 Simulador de Conquista</h1>
  <p>Fluxograma do sistema · Guilherme · Antonio · David</p>
</header>

<div class="card">
  <svg width="100%" viewBox="0 0 680 1020" role="img">
    <title>Fluxograma do Simulador de Conquista</title>
    <desc>Diagrama de fluxo mostrando o loop principal do jogo, as três decisões possíveis por ciclo e as condições de encerramento.</desc>
    <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </marker>
    </defs>

    <rect x="265" y="20" width="150" height="44" rx="22" fill="#1a3f6f" stroke="#0f2a4d" stroke-width="0.5"/>
    <text x="340" y="42" text-anchor="middle" dominant-baseline="central" fill="white" font-size="14" font-weight="500">Início</text>

    <line x1="340" y1="64" x2="340" y2="96" stroke="#57606a" stroke-width="1" marker-end="url(#arrow)"/>

    <rect x="170" y="96" width="340" height="56" rx="8" fill="#e8f0fa" stroke="#2a5fa0" stroke-width="0.5"/>
    <text x="340" y="118" text-anchor="middle" dominant-baseline="central" fill="#0f2a4d" font-size="13" font-weight="500">Inicializar estado</text>
    <text x="340" y="138" text-anchor="middle" dominant-baseline="central" fill="#2a5fa0" font-size="11">interesse=50 · confianca=30 · humor=50 · ciclo=1</text>

    <line x1="340" y1="152" x2="340" y2="192" stroke="#57606a" stroke-width="1" marker-end="url(#arrow)"/>

    <polygon points="340,192 460,232 340,272 220,232" fill="#fff9e6" stroke="#b07000" stroke-width="0.5"/>
    <text x="340" y="228" text-anchor="middle" dominant-baseline="central" fill="#5a3700" font-size="12" font-weight="500">ciclo ≤ 10</text>
    <text x="340" y="244" text-anchor="middle" dominant-baseline="central" fill="#b07000" font-size="11">e interesse &gt; 0 ?</text>

    <line x1="340" y1="272" x2="340" y2="308" stroke="#57606a" stroke-width="1" marker-end="url(#arrow)"/>
    <text x="352" y="292" fill="#57606a" font-size="11">Sim</text>

    <line x1="460" y1="232" x2="580" y2="232" stroke="#57606a" stroke-width="1" marker-end="url(#arrow)"/>
    <text x="498" y="224" fill="#57606a" font-size="11">Não</text>

    <rect x="200" y="308" width="280" height="44" rx="8" fill="#f0f6ff" stroke="#2a5fa0" stroke-width="0.5"/>
    <text x="340" y="330" text-anchor="middle" dominant-baseline="central" fill="#0f2a4d" font-size="13" font-weight="500">exibir_status()</text>

    <line x1="340" y1="352" x2="340" y2="384" stroke="#57606a" stroke-width="1" marker-end="url(#arrow)"/>

    <rect x="200" y="384" width="280" height="44" rx="8" fill="#f0f6ff" stroke="#2a5fa0" stroke-width="0.5"/>
    <text x="340" y="406" text-anchor="middle" dominant-baseline="central" fill="#0f2a4d" font-size="13" font-weight="500">exibir_menu() · ler opção</text>

    <line x1="340" y1="428" x2="340" y2="460" stroke="#57606a" stroke-width="1" marker-end="url(#arrow)"/>

    <polygon points="340,460 460,500 340,540 220,500" fill="#f0f6ff" stroke="#2a5fa0" stroke-width="0.5"/>
    <text x="340" y="496" text-anchor="middle" dominant-baseline="central" fill="#0f2a4d" font-size="12" font-weight="500">Opção escolhida</text>
    <text x="340" y="512" text-anchor="middle" dominant-baseline="central" fill="#2a5fa0" font-size="11">A · B · C</text>

    <line x1="220" y1="500" x2="100" y2="500" stroke="#57606a" stroke-width="1" marker-end="url(#arrow)"/>
    <text x="150" y="490" text-anchor="middle" fill="#57606a" font-size="11">A</text>

    <line x1="340" y1="540" x2="340" y2="572" stroke="#57606a" stroke-width="1" marker-end="url(#arrow)"/>
    <text x="352" y="558" fill="#57606a" font-size="11">B</text>

    <line x1="460" y1="500" x2="580" y2="500" stroke="#57606a" stroke-width="1" marker-end="url(#arrow)"/>
    <text x="510" y="490" text-anchor="middle" fill="#57606a" font-size="11">C</text>

    <rect x="14" y="468" width="86" height="66" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="0.5"/>
    <text x="57" y="492" text-anchor="middle" dominant-baseline="central" fill="#1b5e20" font-size="11" font-weight="500">Mensagem</text>
    <text x="57" y="508" text-anchor="middle" dominant-baseline="central" fill="#388e3c" font-size="10">interesse +10</text>
    <text x="57" y="522" text-anchor="middle" dominant-baseline="central" fill="#388e3c" font-size="10">confiança +5</text>

    <line x1="57" y1="534" x2="57" y2="650" stroke="#57606a" stroke-width="1"/>
    <line x1="57" y1="650" x2="234" y2="650" stroke="#57606a" stroke-width="1" marker-end="url(#arrow)"/>

    <rect x="234" y="572" width="212" height="66" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="0.5"/>
    <text x="340" y="596" text-anchor="middle" dominant-baseline="central" fill="#1b5e20" font-size="11" font-weight="500">Encontro</text>
    <text x="340" y="612" text-anchor="middle" dominant-baseline="central" fill="#388e3c" font-size="10">interesse +20 (se conf ≥ 50)</text>
    <text x="340" y="626" text-anchor="middle" dominant-baseline="central" fill="#388e3c" font-size="10">ou -10 se conf &lt; 50</text>

    <line x1="340" y1="638" x2="340" y2="660" stroke="#57606a" stroke-width="1" marker-end="url(#arrow)"/>

    <rect x="580" y="468" width="86" height="66" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="0.5"/>
    <text x="623" y="492" text-anchor="middle" dominant-baseline="central" fill="#1b5e20" font-size="11" font-weight="500">Espaço</text>
    <text x="623" y="508" text-anchor="middle" dominant-baseline="central" fill="#388e3c" font-size="10">interesse -5</text>
    <text x="623" y="522" text-anchor="middle" dominant-baseline="central" fill="#388e3c" font-size="10">humor +10</text>

    <line x1="623" y1="534" x2="623" y2="650" stroke="#57606a" stroke-width="1"/>
    <line x1="623" y1="650" x2="446" y2="650" stroke="#57606a" stroke-width="1" marker-end="url(#arrow)"/>

    <rect x="234" y="660" width="212" height="44" rx="8" fill="#e8f0fa" stroke="#2a5fa0" stroke-width="0.5"/>
    <text x="340" y="682" text-anchor="middle" dominant-baseline="central" fill="#0f2a4d" font-size="13" font-weight="500">aplicar_decisao()</text>

    <line x1="340" y1="704" x2="340" y2="736" stroke="#57606a" stroke-width="1" marker-end="url(#arrow)"/>

    <rect x="200" y="736" width="280" height="44" rx="8" fill="#e8f0fa" stroke="#2a5fa0" stroke-width="0.5"/>
    <text x="340" y="758" text-anchor="middle" dominant-baseline="central" fill="#0f2a4d" font-size="13" font-weight="500">atualizar_relacao()</text>

    <line x1="340" y1="780" x2="340" y2="812" stroke="#57606a" stroke-width="1" marker-end="url(#arrow)"/>

    <polygon points="340,812 440,840 340,868 240,840" fill="#fff0f0" stroke="#c62828" stroke-width="0.5"/>
    <text x="340" y="836" text-anchor="middle" dominant-baseline="central" fill="#7f0000" font-size="12" font-weight="500">interesse ≤ 0?</text>

    <line x1="340" y1="868" x2="340" y2="896" stroke="#57606a" stroke-width="1" marker-end="url(#arrow)"/>
    <text x="352" y="884" fill="#57606a" font-size="11">Não</text>

    <line x1="240" y1="840" x2="130" y2="840" stroke="#c62828" stroke-width="1" marker-end="url(#arrow)"/>
    <text x="176" y="832" text-anchor="middle" fill="#c62828" font-size="11">Sim</text>

    <rect x="30" y="812" width="100" height="56" rx="8" fill="#ffebee" stroke="#c62828" stroke-width="0.5"/>
    <text x="80" y="836" text-anchor="middle" dominant-baseline="central" fill="#7f0000" font-size="12" font-weight="500">❌ Derrota</text>
    <text x="80" y="854" text-anchor="middle" dominant-baseline="central" fill="#c62828" font-size="10">ela perdeu</text>
    <text x="80" y="866" text-anchor="middle" dominant-baseline="central" fill="#c62828" font-size="10">o interesse</text>

    <polygon points="340,896 456,924 340,952 224,924" fill="#fff9e6" stroke="#b07000" stroke-width="0.5"/>
    <text x="340" y="920" text-anchor="middle" dominant-baseline="central" fill="#5a3700" font-size="12" font-weight="500">relacao ==</text>
    <text x="340" y="936" text-anchor="middle" dominant-baseline="central" fill="#b07000" font-size="11">"namoro"?</text>

    <line x1="456" y1="924" x2="550" y2="924" stroke="#2e7d32" stroke-width="1" marker-end="url(#arrow)"/>
    <text x="498" y="916" text-anchor="middle" fill="#2e7d32" font-size="11">Sim</text>

    <line x1="340" y1="952" x2="340" y2="980" stroke="#57606a" stroke-width="1" marker-end="url(#arrow)"/>
    <text x="352" y="968" fill="#57606a" font-size="11">Não</text>

    <rect x="550" y="896" width="100" height="56" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="0.5"/>
    <text x="600" y="920" text-anchor="middle" dominant-baseline="central" fill="#1b5e20" font-size="12" font-weight="500">✅ Vitória</text>
    <text x="600" y="938" text-anchor="middle" dominant-baseline="central" fill="#2e7d32" font-size="10">você</text>
    <text x="600" y="950" text-anchor="middle" dominant-baseline="central" fill="#2e7d32" font-size="10">conquistou!</text>

    <rect x="234" y="980" width="212" height="36" rx="8" fill="#f6f8fa" stroke="#57606a" stroke-width="0.5"/>
    <text x="340" y="998" text-anchor="middle" dominant-baseline="central" fill="#24292f" font-size="13">ciclo ← ciclo + 1</text>

    <line x1="234" y1="998" x2="80" y2="998" stroke="#57606a" stroke-width="1"/>
    <line x1="80" y1="998" x2="80" y2="232" stroke="#57606a" stroke-width="1"/>
    <line x1="80" y1="232" x2="218" y2="232" stroke="#57606a" stroke-width="1" marker-end="url(#arrow)"/>
    <text x="60" y="615" text-anchor="middle" fill="#57606a" font-size="11" transform="rotate(-90 60 615)">volta ao loop</text>

    <rect x="540" y="204" width="120" height="56" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="0.5"/>
    <text x="600" y="228" text-anchor="middle" dominant-baseline="central" fill="#7f3100" font-size="12" font-weight="500">⏰ Tempo</text>
    <text x="600" y="246" text-anchor="middle" dominant-baseline="central" fill="#e65100" font-size="10">ciclo &gt; 10 sem</text>
    <text x="600" y="258" text-anchor="middle" dominant-baseline="central" fill="#e65100" font-size="10">namoro</text>
  </svg>

  <div class="legend">
    <div class="legend-item">
      <div class="legend-dot" style="background:#1a3f6f"></div>
      Início / Fim
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#e8f0fa; border:1px solid #2a5fa0"></div>
      Processo
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#fff9e6; border:1px solid #b07000; transform: rotate(45deg)"></div>
      Decisão
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#e8f5e9; border:1px solid #2e7d32"></div>
      Ação do jogador
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#ffebee; border:1px solid #c62828"></div>
      Derrota
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#fff3e0; border:1px solid #e65100"></div>
      Tempo esgotado
    </div>
  </div>
</div>

<footer>
  UNASP · Experiências pra Vida &nbsp;·&nbsp; Guilherme · Antonio · David · 2026
</footer>

</body>
</html>
